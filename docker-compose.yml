version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq-sensor-gateway
    ports:
      - "5672:5672"      # AMQP protocol
      - "15672:15672"    # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - sensor-network

  pre-processamento:
    build:
      context: .
      dockerfile: Dockerfile.preprocessing
    container_name: pre-processamento-service
    ports:
      - "5001:5001"
    networks:
      - sensor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:5001/health').status)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  analise:
    build:
      context: .
      dockerfile: Dockerfile.analysis
    container_name: analise-service
    ports:
      - "6001:6001"
    networks:
      - sensor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:6001/health').status)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  interface:
    build:
      context: .
      dockerfile: Dockerfile.interface
    container_name: interface-dashboard
    ports:
      - "8000:8000"
    volumes:
      - ./dados:/app/dados
    networks:
      - sensor-network
    restart: unless-stopped
    depends_on:
      - analise
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:8000/health').status)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: gateway-service
    volumes:
      - ./dados:/app/dados
    networks:
      - sensor-network
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      servidor:
        condition: service_started
      pre-processamento:
        condition: service_started
    healthcheck:
      test: ["CMD", "sh", "-c", "grep -q Gateway /proc/1/cmdline"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - SERVER_ENDPOINT=servidor:7000
      - CSV_PATH=/app/dados/gateway.csv
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - PRE_PROCESSAMENTO_HOST=pre-processamento

  servidor:
    build:
      context: .
      dockerfile: Dockerfile.servidor
    container_name: servidor-central
    ports:
      - "7000:7000"
    volumes:
      - ./dados:/app/dados
    networks:
      - sensor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "grep -q Servidor /proc/1/cmdline"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - LISTEN_PORT=7000
      - ANALISE_HOST=analise

volumes:
  rabbitmq_data:

networks:
  sensor-network:
    driver: bridge
