version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq-sensor-gateway
    ports:
      - "5672:5672"      # AMQP protocol
      - "15672:15672"    # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - sensor-network

  pre-processamento:
    build:
      context: .
      dockerfile: Dockerfile.preprocessing
    container_name: pre-processamento-service
    ports:
      - "5001:5001"
    networks:
      - sensor-network
    restart: unless-stopped

  analise:
    build:
      context: .
      dockerfile: Dockerfile.analysis
    container_name: analise-service
    ports:
      - "6001:6001"
    networks:
      - sensor-network
    restart: unless-stopped

  interface:
    build:
      context: .
      dockerfile: Dockerfile.interface
    container_name: interface-dashboard
    ports:
      - "8000:8000"
    volumes:
      - ./dados:/app/dados
    networks:
      - sensor-network
    restart: unless-stopped
    depends_on:
      - analise

volumes:
  rabbitmq_data:

networks:
  sensor-network:
    driver: bridge
