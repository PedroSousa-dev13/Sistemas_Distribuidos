syntax = "proto3";

package analise;

service Analise {
  rpc CalcularEstatisticas (AnaliseRequest) returns (EstatisticasResponse);
  rpc DetetarPadroes (AnaliseRequest) returns (PadroesResponse);
  rpc PreverRiscos (AnaliseRequest) returns (PrevisaoResponse);
}

message AnaliseRequest {
  string sensor_id = 1;
  string tipo_dado = 2;
  string inicio = 3;
  string fim = 4;
  string tipo_analise = 5;
  repeated double valores = 6;
}

message EstatisticasResponse {
  string sensor_id = 1;
  string tipo_dado = 2;
  int32 count = 3;
  double media = 4;
  double mediana = 5;
  double desvio_padrao = 6;
  double variancia = 7;
  double minimo = 8;
  double maximo = 9;
  double q1 = 10;
  double q3 = 11;
  bool sucesso = 12;
  string erro = 13;
}

message Anomalia {
  int32 indice = 1;
  double valor = 2;
  double z_score = 3;
  string descricao = 4;
}

message PadroesResponse {
  string sensor_id = 1;
  string tipo_dado = 2;
  repeated Anomalia anomalias = 3;
  string tendencia = 4;
  int32 total_anomalias = 5;
  bool sucesso = 6;
  string erro = 7;
}

message PrevisaoResponse {
  string sensor_id = 1;
  string tipo_dado = 2;
  repeated double previsoes = 3;
  string tendencia = 4;
  string risco = 5;
  double proximo_valor = 6;
  bool sucesso = 7;
  string erro = 8;
}
